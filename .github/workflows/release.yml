name: Android CI/CD Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # ── Version Management ──
      - name: Read Current Version
        id: current_version
        run: |
          OLD_CODE=$(grep "VERSION_CODE" version.properties | cut -d'=' -f2 | tr -d ' \r')
          OLD_NAME=$(grep "VERSION_NAME" version.properties | cut -d'=' -f2 | tr -d ' \r')
          echo "old_code=$OLD_CODE" >> $GITHUB_OUTPUT
          echo "old_name=$OLD_NAME" >> $GITHUB_OUTPUT
          echo "📌 Current version: v$OLD_NAME ($OLD_CODE)"

      - name: Bump Version
        id: bump
        run: |
          OLD_CODE=${{ steps.current_version.outputs.old_code }}
          OLD_NAME=${{ steps.current_version.outputs.old_name }}
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          if [ -z "$BUMP_TYPE" ]; then
            COMMIT_MSG=$(git log -1 --pretty=%B)
            echo "Commit message: $COMMIT_MSG"
            if echo "$COMMIT_MSG" | grep -iqE "\[major\]|\[breaking\]"; then
              BUMP_TYPE="major"
            elif echo "$COMMIT_MSG" | grep -iqE "\[minor\]|feat:|\[feature\]"; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi
          fi

          # Increment versionCode
          NEW_CODE=$((OLD_CODE + 1))

          # Parse semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_NAME"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              UPDATE_BADGE="MAJOR UPDATE"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              UPDATE_BADGE="FEATURE UPDATE"
              ;;
            patch)
              PATCH=$((PATCH + 1))
              UPDATE_BADGE="HOTFIX"
              ;;
          esac

          NEW_NAME="${MAJOR}.${MINOR}.${PATCH}"

          echo "new_code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "new_name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "update_badge=$UPDATE_BADGE" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

          echo "🚀 Version bump: v$OLD_NAME ($OLD_CODE) → v$NEW_NAME ($NEW_CODE) [$UPDATE_BADGE]"

      - name: Write Version Properties
        run: |
          cat > version.properties << EOF
          # Version properties - auto-managed by CI
          # DO NOT EDIT MANUALLY
          VERSION_CODE=${{ steps.bump.outputs.new_code }}
          VERSION_NAME=${{ steps.bump.outputs.new_name }}
          EOF

      # ── Build ──
      - name: Ensure Gradle wrapper or install Gradle
        id: ensure_gradle
        run: |
          if [ -f ./gradlew ]; then
            echo "Using committed Gradle wrapper"
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> $GITHUB_OUTPUT
          else
            echo "No gradlew found — installing Gradle 8.2"
            curl -sSfL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            export PATH="$PWD/gradle-8.2/bin:$PATH"
            gradle wrapper --gradle-version 8.2
            chmod +x gradlew
            echo "GRADLE_CMD=./gradlew" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK (verbose)
        run: |
          set -o pipefail
          ${{ steps.ensure_gradle.outputs.GRADLE_CMD || './gradlew' }} assembleRelease --stacktrace --warning-mode=all --no-daemon 2>&1 | tee build-output.log

      - name: Upload Gradle logs & reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            build-output.log
            **/build/reports/problems/**

      - name: Prepare APK for Release
        run: |
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/VesperLedger.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/VesperLedger.apk
          fi

      # ── Commit & Tag ──
      - name: Commit Version Bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_name }} (${{ steps.bump.outputs.new_code }})"
          git push origin HEAD:main

      - name: Create & Push Tag
        run: |
          TAG="v${{ steps.bump.outputs.new_name }}"
          git tag -a "$TAG" -m "Release $TAG (${{ steps.bump.outputs.new_code }}) — ${{ steps.bump.outputs.update_badge }}"
          git push origin "$TAG"

      # ── GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump.outputs.new_name }}
          files: app/build/outputs/apk/release/VesperLedger.apk
          draft: false
          prerelease: false
          name: "v${{ steps.bump.outputs.new_name }} — ${{ steps.bump.outputs.update_badge }}"
          body: |
            ## Vesper Ledger v${{ steps.bump.outputs.new_name }}

            | Property | Value |
            |---|---|
            | **Version Name** | `${{ steps.bump.outputs.new_name }}` |
            | **Version Code** | `${{ steps.bump.outputs.new_code }}` |
            | **Previous** | `${{ steps.current_version.outputs.old_name }}` (`${{ steps.current_version.outputs.old_code }}`) |
            | **Update Type** | `${{ steps.bump.outputs.update_badge }}` |
            | **Bump** | `${{ steps.bump.outputs.bump_type }}` |

            ---

            **Installation:** Download `VesperLedger.apk` below and install it on your Android device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
