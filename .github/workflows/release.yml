name: Android CI/CD Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Prepare APK for Release
        run: |
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/VesperLedger.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/VesperLedger.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/VesperLedger.apk
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            Welcome to the official release of Vesper Ledger, a modern shadcn-inspired expense tracker.
            
            ### What's New
            - Minimalist, distraction-free bento grid dashboard.
            - Monochromatic theme following strict shadcn guidelines.
            - Fast, offline-first Room database storage.
            - Dynamic fonts (Space Grotesk & Plus Jakarta Sans).
            - Custom categories and savings goals tracker.
            
            **Installation:** Download `VesperLedger.apk` below and install it on your Android device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
