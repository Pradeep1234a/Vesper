name: Android CI/CD Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Generate Temporary Keystore
        run: keytool -genkey -v -keystore release.keystore -alias vesper -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Vesper, OU=Ledger, O=Vesper, L=Mobile, S=App, C=US" -storepass password -keypass password

      - name: Build Release APK
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore -Pandroid.injected.signing.store.password=password -Pandroid.injected.signing.key.alias=vesper -Pandroid.injected.signing.key.password=password

      - name: Prepare APK for Release
        run: |
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/VesperLedger.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/VesperLedger.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/VesperLedger.apk
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            Welcome to the official release of Vesper Ledger, a modern shadcn-inspired expense tracker.
            
            ### What's New
            - Minimalist, distraction-free bento grid dashboard.
            - Monochromatic theme following strict shadcn guidelines.
            - Fast, offline-first Room database storage.
            - Dynamic fonts (Space Grotesk & Plus Jakarta Sans).
            - Custom categories and savings goals tracker.
            
            **Installation:** Download `VesperLedger.apk` below and install it on your Android device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
